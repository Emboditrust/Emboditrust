<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://emboditrust.com" />
    <link rel="dns-prefetch" href="https://emboditrust.com" />
    <title>Verification</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #f1f5f9;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      #verify-frame {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        border: none;
        display: block;
      }
    </style>
  </head>
  <body>
    <script>
      (function () {
        var id = new URLSearchParams(window.location.search).get("id") || "";
        var iframe = document.createElement("iframe");
        iframe.id = "verify-frame";
        iframe.src =
          "https://emboditrust.com/verify-iframe?id=" + encodeURIComponent(id);
        iframe.setAttribute("loading", "eager");
        iframe.setAttribute("importance", "high");
        iframe.setAttribute("fetchpriority", "high");
        iframe.setAttribute("allowfullscreen", "");
        iframe.setAttribute("allow", "same-origin");
        document.body.appendChild(iframe);
      })();
    </script>
  </body>
</html>
