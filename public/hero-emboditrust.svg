    <text x="122" y="105" fill="#FFFFFF" font-family="Urbanist, Outfit, Arial, sans-serif" font-size="11" font-weight="700">SCAN</text>
    <rect x="154" y="86" width="28" height="52" rx="6" fill="#FFFFFF" stroke="#0B1C2E" stroke-width="2"/>
    <rect x="159" y="92" width="18" height="28" rx="3" fill="#E6EEF7"/>
    <rect x="162" y="96" width="4" height="4" fill="#0B1C2E"/>
    <rect x="170" y="96" width="4" height="4" fill="#0B1C2E"/>
    <rect x="162" y="104" width="4" height="4" fill="#0B1C2E"/>
    <rect x="170" y="104" width="4" height="4" fill="#0B1C2E"/>
    <rect x="66" y="174" width="14" height="56" rx="7" fill="#0B1C2E"/>
    <rect x="90" y="174" width="14" height="56" rx="7" fill="#0B1C2E"/>
