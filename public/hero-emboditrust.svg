    <text x="22" y="35" fill="#032434" font-family="Urbanist, Outfit, Arial, sans-serif" font-size="20" font-weight="800">Verification Result</text>

    <circle cx="34" cy="92" r="11" fill="#22C55E"/>
    <path d="M29 92l4 4 8-9" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="54" y="99" fill="#16A34A" font-family="Urbanist, Outfit, Arial, sans-serif" font-size="18" font-weight="800">GENUINE</text>

    <rect x="20" y="118" width="176" height="1" fill="#E2E8F0"/>

    <text x="22" y="152" fill="#64748B" font-family="Urbanist, Outfit, Arial, sans-serif" font-size="13" font-weight="700">Code</text>
    <text x="116" y="152" fill="#0F172A" font-family="Urbanist, Outfit, Arial, sans-serif" font-size="13" font-weight="800">EMB-7K2P-193</text>

    <text x="22" y="182" fill="#64748B" font-family="Urbanist, Outfit, Arial, sans-serif" font-size="13" font-weight="700">First Scan</text>
