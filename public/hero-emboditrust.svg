    <text x="54" y="260" fill="#FFFFFF" font-family="Urbanist, Outfit, Arial, sans-serif" font-size="15" font-weight="700">View Full Evidence</text>
  </g>

  <text x="120" y="542" fill="#64748B" font-family="Urbanist, Outfit, Arial, sans-serif" font-size="14" font-weight="700">Product verification powered by EmbodiTrust Intelligence</text>
