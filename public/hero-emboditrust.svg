    <rect x="20" y="20" width="144" height="42" rx="10" fill="#ECFEFF"/>
    <text x="34" y="47" fill="#032434" font-family="Urbanist, Outfit, Arial, sans-serif" font-size="18" font-weight="800">EmbodiTrust Seal</text>
