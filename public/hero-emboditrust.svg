    <rect x="40" y="92" width="16" height="16" fill="#0B1C2E"/>
    <rect x="64" y="92" width="16" height="16" fill="#0B1C2E"/>
    <rect x="88" y="92" width="16" height="16" fill="#0B1C2E"/>
    <rect x="112" y="92" width="16" height="16" fill="#0B1C2E"/>
    <rect x="40" y="116" width="16" height="16" fill="#0B1C2E"/>
    <rect x="88" y="116" width="16" height="16" fill="#0B1C2E"/>
    <rect x="112" y="116" width="16" height="16" fill="#0B1C2E"/>
    <rect x="64" y="140" width="16" height="16" fill="#0B1C2E"/>
    <rect x="88" y="140" width="16" height="16" fill="#0B1C2E"/>
    <rect x="112" y="140" width="16" height="16" fill="#0B1C2E"/>
    <rect x="40" y="164" width="16" height="16" fill="#0B1C2E"/>
