<svg xmlns="http://www.w3.org/2000/svg" width="960" height="640" viewBox="0 0 960 640" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FBFF"/>
      <stop offset="1" stop-color="#EFF6FF"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F8FAFC"/>
    </linearGradient>
    <filter id="shadow" x="-50" y="-50" width="1060" height="740" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0B1C2E" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="960" height="640" rx="32" fill="url(#bg)"/>

  <circle cx="146" cy="132" r="88" fill="#FDE7EF"/>
  <circle cx="828" cy="518" r="92" fill="#DFF7F6"/>

  <g filter="url(#shadow)">
    <rect x="88" y="74" width="784" height="492" rx="24" fill="url(#card)" stroke="#D5DFEB" stroke-width="2"/>
  </g>

  <!-- Header row -->
  <rect x="120" y="108" width="720" height="56" rx="14" fill="#FFFFFF" stroke="#D7E1EE"/>
  <circle cx="150" cy="136" r="9" fill="#22D3EE"/>
  <text x="172" y="142" fill="#032434" font-family="Urbanist, Outfit, Arial, sans-serif" font-size="22" font-weight="800">EmbodiTrust</text>
  <rect x="630" y="118" width="182" height="36" rx="10" fill="#032434"/>
  <text x="662" y="141" fill="#FFFFFF" font-family="Urbanist, Outfit, Arial, sans-serif" font-size="16" font-weight="700">Verified Product</text>

